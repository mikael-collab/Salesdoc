<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f4c8a">
<title>מנהל חשבוניות</title>
<script src="https://accounts.google.com/gsi/client" async defer onload="gisLoaded()"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --primary:#0f4c8a;
  --primary-d:#083770;
  --primary-l:#e8f1fb;
  --green:#1a7a4a;
  --green-l:#e6f5ec;
  --bg:#f0f2f8;
  --card:#fff;
  --text:#1a1f36;
  --muted:#6b7a99;
  --border:#dde3ef;
  --row3:#0f4c8a;
  --danger:#b91c1c;
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);direction:rtl;overscroll-behavior:none;-webkit-font-smoothing:antialiased}
#app{height:100%;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* HEADER */
.hdr{background:var(--primary);color:#fff;padding:calc(var(--safe-t) + 10px) 14px 10px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 12px rgba(0,0,0,.25);position:relative;z-index:50;flex-shrink:0}
.hdr-btn{background:none;border:none;color:#fff;cursor:pointer;padding:8px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.hdr-btn:active{background:rgba(255,255,255,.2)}
.hdr-title{flex:1;font-size:17px;font-weight:700;letter-spacing:.1px}
.hdr-sub{font-size:11px;opacity:.75;margin-top:1px}

/* CONTENT */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--safe-b) + 90px)}

/* CARDS */
.card{background:var(--card);border-radius:14px;box-shadow:0 1px 5px rgba(0,0,0,.07);overflow:hidden;margin:10px 14px}
.card-nm{margin:0}

/* INVOICE CARDS */
.inv-card{cursor:pointer;transition:transform .1s}
.inv-card:active{transform:scale(.98)}
.inv-row{padding:9px 14px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.inv-row-1{border-bottom:1px solid var(--border);font-size:14px}
.inv-row-2{border-bottom:1px solid var(--border);font-size:13px}
.inv-row-3{color:var(--row3);font-weight:700;font-size:13px}
.badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;white-space:nowrap}
.badge-h{background:var(--primary-l);color:var(--primary)}
.badge-r{background:var(--green-l);color:var(--green)}

/* FAB */
.fab-wrap{position:fixed;bottom:calc(var(--safe-b)+14px);left:0;right:0;display:flex;justify-content:center;gap:12px;z-index:200;padding:0 14px}
.fab{background:var(--primary);color:#fff;border:none;border-radius:26px;padding:13px 18px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 4px 18px rgba(15,76,138,.4);display:flex;align-items:center;gap:7px;white-space:nowrap;font-family:inherit;flex:1;justify-content:center;max-width:180px}
.fab:active{transform:scale(.95)}
.fab-g{background:var(--green);box-shadow:0 4px 18px rgba(26,122,74,.4)}

/* SEARCH */
.srch{margin:10px 14px;position:relative}
.srch-inp{width:100%;padding:11px 14px 11px 42px;border:2px solid var(--border);border-radius:12px;font-size:15px;background:#fff;color:var(--text);direction:rtl;outline:none;transition:border-color .2s;font-family:inherit}
.srch-inp:focus{border-color:var(--primary)}
.srch-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}

/* FILTER TABS */
.tabs{display:flex;gap:7px;padding:4px 14px 8px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{background:#fff;border:1.5px solid var(--border);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;color:var(--muted);transition:all .15s;font-family:inherit}
.tab.on{background:var(--primary);border-color:var(--primary);color:#fff}

/* FORM */
.fsec{margin:10px 14px}
.fsec-t{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px}
.fgrp{margin-bottom:10px}
.flbl{display:block;font-size:12px;color:var(--muted);margin-bottom:3px;font-weight:600}
.finp,.fsel{width:100%;padding:11px 12px;border:2px solid var(--border);border-radius:10px;font-size:15px;background:#fff;color:var(--text);direction:rtl;outline:none;transition:border-color .2s;font-family:inherit;appearance:none}
.finp:focus,.fsel:focus{border-color:var(--primary)}
.finp[type=number]{text-align:left;direction:ltr}
.finp[type=date]{direction:ltr;text-align:right}

/* ITEMS */
.item-hdr,.item-row{display:grid;grid-template-columns:1fr 60px 75px 32px;gap:6px;align-items:start}
.item-hdr span{font-size:11px;font-weight:700;color:var(--muted)}
.item-row .finp{padding:9px 8px;font-size:13px}
.btn-rm{background:none;border:1.5px solid #fca5a5;color:#dc2626;border-radius:8px;padding:9px 4px;cursor:pointer;font-size:14px;text-align:center;width:32px}
.btn-add{background:var(--primary-l);border:2px dashed var(--primary);color:var(--primary);border-radius:10px;padding:11px;cursor:pointer;width:100%;font-size:13px;font-weight:700;text-align:center;margin-top:4px;font-family:inherit}

/* TOTALS */
.totals{background:var(--card);border-radius:14px;margin:10px 14px;overflow:hidden;box-shadow:0 1px 5px rgba(0,0,0,.07)}
.total-row{display:flex;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--border);font-size:14px}
.total-row:last-child{border:none}
.total-grand{background:var(--primary);color:#fff;font-weight:800;font-size:16px}
.total-grand span:last-child{font-size:18px}

/* BUTTONS */
.btn-p{background:var(--primary);color:#fff;border:none;border-radius:12px;padding:15px 20px;font-size:16px;font-weight:700;cursor:pointer;width:100%;font-family:inherit;transition:opacity .15s}
.btn-p:active{opacity:.85}
.btn-p:disabled{opacity:.6}
.btn-s{background:#fff;color:var(--primary);border:2px solid var(--primary);border-radius:12px;padding:13px 20px;font-size:16px;font-weight:700;cursor:pointer;width:100%;font-family:inherit}
.btn-s:active{background:var(--primary-l)}
.btn-d{background:#fff;color:var(--danger);border:2px solid var(--danger);border-radius:12px;padding:13px 20px;font-size:15px;font-weight:700;cursor:pointer;width:100%;font-family:inherit}

/* SAVE BAR */
.save-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);padding:10px 14px calc(var(--safe-b)+10px);z-index:100;box-shadow:0 -2px 12px rgba(0,0,0,.08)}

/* DIALOG */
.dlg-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;z-index:1000;animation:fadein .15s}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.dlg{background:#fff;border-radius:20px 20px 0 0;padding:20px 16px calc(var(--safe-b)+20px);width:100%;animation:slideup .22s ease-out}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.dlg-title{font-size:18px;font-weight:800;text-align:center;margin-bottom:6px}
.dlg-text{font-size:14px;color:var(--muted);text-align:center;margin-bottom:22px}
.dlg-btns{display:flex;gap:10px}

/* CUSTOMER MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:900;display:flex;flex-direction:column}
.modal{background:#fff;border-radius:20px 20px 0 0;margin-top:auto;max-height:82vh;display:flex;flex-direction:column;animation:slideup .22s ease-out}
.modal-hdr{padding:14px 16px;border-bottom:1px solid var(--border);font-size:16px;font-weight:800;display:flex;justify-content:space-between;align-items:center}
.modal-srch{padding:10px 14px;border-bottom:1px solid var(--border)}
.modal-list{overflow-y:auto;flex:1}
.cust-item{padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer}
.cust-item:active{background:var(--primary-l)}
.cust-name{font-weight:700;font-size:15px}
.cust-id{font-size:12px;color:var(--muted);margin-top:2px}

/* LOADING */
.spin{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.skel{background:linear-gradient(90deg,#ececec 25%,#e0e0e0 50%,#ececec 75%);background-size:200% 100%;animation:shim 1.2s infinite;border-radius:6px}
@keyframes shim{to{background-position:-200% 0}}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--safe-b)+105px);left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:9px 20px;border-radius:24px;font-size:13px;z-index:3000;animation:tin .3s ease-out;white-space:nowrap;max-width:calc(100% - 32px);text-align:center}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.toast-ok{background:var(--green)}
.toast-err{background:var(--danger)}

/* LOGIN */
.login-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;padding:24px;background:linear-gradient(160deg,var(--primary) 0%,var(--primary-d) 100%);overflow-y:auto}
.login-icon{width:72px;height:72px;background:rgba(255,255,255,.18);border-radius:20px;display:flex;align-items:center;justify-content:center;margin-bottom:20px;font-size:36px}
.login-title{color:#fff;font-size:26px;font-weight:800;margin-bottom:6px;text-align:center}
.login-sub{color:rgba(255,255,255,.75);font-size:14px;margin-bottom:32px;text-align:center}
.login-card{background:#fff;border-radius:18px;padding:22px;width:100%;max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.step-lbl{font-size:12px;font-weight:800;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:7px}
.step-n{width:20px;height:20px;background:var(--primary);color:#fff;border-radius:50%;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-hint{font-size:11px;color:var(--muted);margin-top:4px}
.step-group{margin-bottom:16px}

/* INVOICE VIEW */
.inv-view-top{padding:16px;text-align:center;font-size:19px;font-weight:800}
.inv-view-num{font-size:12px;opacity:.8;margin-top:3px;font-weight:400}
.detail-row{display:flex;justify-content:space-between;padding:9px 14px;border-bottom:1px solid var(--border);font-size:13px}
.detail-row:last-child{border:none}
.dlbl{color:var(--muted)}
.dval{font-weight:600;text-align:left}
.items-tbl{width:100%;border-collapse:collapse;font-size:12px}
.items-tbl th{background:var(--bg);padding:7px 10px;text-align:right;font-weight:700;color:var(--muted)}
.items-tbl td{padding:9px 10px;border-bottom:1px solid var(--border)}
.items-tbl td:last-child,.items-tbl th:last-child{text-align:left}

/* SETTINGS */
.sett-row{display:flex;justify-content:space-between;align-items:center;padding:14px;border-bottom:1px solid var(--border)}
.sett-row:last-child{border:none}
.sett-lbl{font-weight:600;font-size:14px}
.sett-val{color:var(--muted);font-size:12px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;direction:ltr;text-align:left}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-ico{font-size:44px;margin-bottom:12px}

/* SAVING OVERLAY */
.saving{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:4000;display:flex;align-items:center;justify-content:center}
.saving-box{background:#fff;border-radius:16px;padding:24px 32px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.25)}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* ─────────────────────────────────────────────
   CONFIG (stored in localStorage)
───────────────────────────────────────────── */
const CFG = {
  CLIENT_ID: localStorage.getItem('cid') || '',
  SHEET_ID:  localStorage.getItem('sid') || '',
  TAB_NAME:  localStorage.getItem('tab') || 'חשבוניות',
  // Column indices (0-based)
  C: { NUM:0,TYPE:1,DATE:2,BIZ:3,ID:4,ADDR:5,PHONE:6,
       I1D:7,I1Q:8,I1P:9, I2D:10,I2Q:11,I2P:12, I3D:13,I3Q:14,I3P:15,
       SUB:16,VAT:17,TOTAL:18,NOTES:19 }
};

/* ─────────────────────────────────────────────
   STATE
───────────────────────────────────────────── */
const S = {
  screen: (CFG.CLIENT_ID && CFG.SHEET_ID) ? 'init' : 'setup',
  invoices: [],
  customers: [],
  currentInv: null,
  search: '',
  filter: 'all',
  loading: false,
  saving: false,
  token: null,
  tokenExp: 0,
  dialog: null,
  custModal: false,
  custSearch: '',
  toast: null,
};

let FORM = {};
let dlgOk = null, dlgCancel = null;
let filteredCusts = [];
let tokenClient = null;

/* ─────────────────────────────────────────────
   GOOGLE AUTH (GIS only — no gapi dependency)
───────────────────────────────────────────── */
function gisLoaded() {
  if (CFG.CLIENT_ID) initTokenClient();
}

function initTokenClient() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CFG.CLIENT_ID,
    scope: 'https://www.googleapis.com/auth/spreadsheets',
    callback: (r) => {
      if (r.error) { toast('שגיאת אימות: ' + r.error, 'err'); go('setup'); return; }
      S.token = r.access_token;
      S.tokenExp = Date.now() + (r.expires_in || 3600) * 1000 - 60000;
      loadData();
    }
  });
  if (S.screen === 'init') auth();
}

function auth() {
  if (!tokenClient) {
    if (typeof google !== 'undefined') initTokenClient();
    else { toast('טוען ספריות Google...'); setTimeout(auth, 800); }
    return;
  }
  tokenClient.requestAccessToken({ prompt: S.token ? '' : 'consent' });
}

/* ─────────────────────────────────────────────
   SHEETS REST API — direct fetch (no gapi)
───────────────────────────────────────────── */
const SHEETS = 'https://sheets.googleapis.com/v4/spreadsheets';

function sheetHeaders() {
  return { 'Authorization': 'Bearer ' + S.token, 'Content-Type': 'application/json' };
}

async function sheetsGet(range) {
  const url = `${SHEETS}/${encodeURIComponent(CFG.SHEET_ID)}/values/${encodeURIComponent(range)}?valueRenderOption=UNFORMATTED_VALUE`;
  const r = await fetch(url, { headers: sheetHeaders() });
  if (!r.ok) { const e = await r.json(); throw new Error(e.error?.message || r.statusText); }
  return r.json();
}

async function sheetsAppend(range, values) {
  const url = `${SHEETS}/${encodeURIComponent(CFG.SHEET_ID)}/values/${encodeURIComponent(range)}:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`;
  const r = await fetch(url, { method:'POST', headers: sheetHeaders(), body: JSON.stringify({ values }) });
  if (!r.ok) { const e = await r.json(); throw new Error(e.error?.message || r.statusText); }
  return r.json();
}

async function loadData(showLoad = true) {
  if (showLoad) go('loading');
  const sc = sessionStorage.getItem('ivcache');
  if (sc) {
    try {
      const { ts, inv, cust } = JSON.parse(sc);
      if (Date.now() - ts < 300000) {
        assign({ invoices: inv, customers: cust, loading: false });
        go('home'); return;
      }
    } catch(e) {}
  }
  assign({ loading: true });
  try {
    const data = await sheetsGet(`${CFG.TAB_NAME}!A:T`);
    const rows = (data.values || []).slice(1);
    const inv = rows.filter(r => r[0]).map(parseRow).reverse();
    const custMap = new Map();
    rows.forEach(r => {
      const k = (r[CFG.C.BIZ]||'') + '|' + (r[CFG.C.ID]||'');
      if ((r[CFG.C.BIZ]||'') && !custMap.has(k))
        custMap.set(k, { name:r[CFG.C.BIZ]||'', id:r[CFG.C.ID]||'', addr:r[CFG.C.ADDR]||'', phone:r[CFG.C.PHONE]||'' });
    });
    const cust = Array.from(custMap.values());
    sessionStorage.setItem('ivcache', JSON.stringify({ ts: Date.now(), inv, cust }));
    assign({ invoices: inv, customers: cust, loading: false });
    go('home');
  } catch(e) {
    toast('שגיאה: ' + (e.message || 'שגיאה בטעינה'), 'err');
    assign({ loading: false });
    go('home');
  }
}

function parseRow(r) {
  const items = [];
  [[CFG.C.I1D,CFG.C.I1Q,CFG.C.I1P],[CFG.C.I2D,CFG.C.I2Q,CFG.C.I2P],[CFG.C.I3D,CFG.C.I3Q,CFG.C.I3P]].forEach(([d,q,p])=>{
    if (r[d]) items.push({ desc:String(r[d]), qty:+r[q]||1, price:+r[p]||0 });
  });
  return {
    num: String(r[CFG.C.NUM]||''),
    type: String(r[CFG.C.TYPE]||'חשבונית'),
    date: String(r[CFG.C.DATE]||''),
    biz: String(r[CFG.C.BIZ]||''),
    bizId: String(r[CFG.C.ID]||''),
    addr: String(r[CFG.C.ADDR]||''),
    phone: String(r[CFG.C.PHONE]||''),
    items,
    sub: +r[CFG.C.SUB]||0,
    vat: +r[CFG.C.VAT]||0,
    total: +r[CFG.C.TOTAL]||0,
    notes: String(r[CFG.C.NOTES]||''),
  };
}

function invToRow(inv) {
  const a = new Array(20).fill('');
  a[CFG.C.NUM]=inv.num; a[CFG.C.TYPE]=inv.type; a[CFG.C.DATE]=inv.date;
  a[CFG.C.BIZ]=inv.biz; a[CFG.C.ID]=inv.bizId; a[CFG.C.ADDR]=inv.addr; a[CFG.C.PHONE]=inv.phone;
  const its = inv.items.slice(0,3);
  [[CFG.C.I1D,CFG.C.I1Q,CFG.C.I1P],[CFG.C.I2D,CFG.C.I2Q,CFG.C.I2P],[CFG.C.I3D,CFG.C.I3Q,CFG.C.I3P]]
    .forEach(([d,q,p],i)=>{ if(its[i]){a[d]=its[i].desc;a[q]=its[i].qty;a[p]=its[i].price;} });
  a[CFG.C.SUB]=inv.sub; a[CFG.C.VAT]=inv.vat; a[CFG.C.TOTAL]=inv.total; a[CFG.C.NOTES]=inv.notes;
  return a;
}

async function saveInvoice(inv) {
  assign({ saving: true });
  try {
    await sheetsAppend(`${CFG.TAB_NAME}!A:T`, [invToRow(inv)]);
    sessionStorage.removeItem('ivcache');
    const newList = [inv, ...S.invoices];
    const existCust = S.customers.find(c => c.name === inv.biz);
    const newCust = existCust ? S.customers : [{ name:inv.biz, id:inv.bizId, addr:inv.addr, phone:inv.phone }, ...S.customers];
    assign({ invoices: newList, customers: newCust, saving: false });
    toast('החשבונית נשמרה בהצלחה ✓', 'ok');
    go('home');
  } catch(e) {
    toast('שגיאה בשמירה: ' + (e.message || ''), 'err');
    assign({ saving: false });
  }
}

function nextNum() {
  const nums = S.invoices.map(i => parseInt(i.num)).filter(n => !isNaN(n));
  return nums.length ? String(Math.max(...nums) + 1) : '1001';
}

/* ─────────────────────────────────────────────
   FORM / CALCULATIONS
───────────────────────────────────────────── */
function initForm(type) {
  FORM = {
    type, num: nextNum(),
    date: new Date().toISOString().slice(0,10),
    biz:'', bizId:'', addr:'', phone:'',
    items:[{ desc:'', qty:1, price:'' }],
    notes:''
  };
}

function calcTotals() {
  const sub = FORM.items.reduce((s,it)=>s+(+it.qty||0)*(+it.price||0),0);
  const vat = Math.round(sub * 17) / 100;
  return { sub: Math.round(sub*100)/100, vat, total: Math.round((sub+vat)*100)/100 };
}

function fmt(n) {
  if (n === '' || n === undefined || n === null) return '—';
  return '₪' + Number(n).toLocaleString('he-IL',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmtDate(d) {
  if (!d) return '';
  if (d.includes('-')) { const [y,m,dd]=d.split('-'); return `${dd}/${m}/${y}`; }
  return d;
}
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ─────────────────────────────────────────────
   STATE HELPERS
───────────────────────────────────────────── */
function assign(o) { Object.assign(S, o); render(); }
function go(screen) { S.screen = screen; render(); }

function toast(msg, type='info') {
  S.toast = { msg, type };
  render();
  setTimeout(()=>{ S.toast=null; render(); }, 3200);
}

function dialog(title, text, ok, cancel, onOk, onCancel) {
  dlgOk = onOk; dlgCancel = onCancel;
  assign({ dialog: { title, text, ok, cancel } });
}

/* ─────────────────────────────────────────────
   BACK BUTTON
───────────────────────────────────────────── */
history.pushState({}, '', '');
window.addEventListener('popstate', () => {
  history.pushState({}, '', ''); // re-push to stay in SPA
  switch(S.screen) {
    case 'home':
      dialog('לצאת מהאפליקציה?','האם אתה בטוח שברצונך לצאת?','יציאה','ביטול',
        ()=>{ window.location.href='about:blank'; }, ()=>assign({dialog:null}));
      break;
    case 'new-invoice':
      dialog('לצאת ללא שמירה?','השינויים לא יישמרו','צא','המשך עריכה',
        ()=>assign({screen:'home',dialog:null}), ()=>assign({dialog:null}));
      break;
    case 'view-invoice':
      assign({screen:'home',currentInv:null}); break;
    case 'settings':
      assign({screen:'home'}); break;
    case 'setup':
      dialog('לצאת מהאפליקציה?','האם אתה בטוח שברצונך לצאת?','יציאה','ביטול',
        ()=>{ window.location.href='about:blank'; }, ()=>assign({dialog:null}));
      break;
  }
});

/* ─────────────────────────────────────────────
   FILTER
───────────────────────────────────────────── */
function getFiltered() {
  let r = S.invoices;
  if (S.filter !== 'all') r = r.filter(i => i.type === S.filter);
  if (S.search) {
    const q = S.search.toLowerCase();
    r = r.filter(i => i.biz.toLowerCase().includes(q) || i.bizId.includes(q) || i.num.includes(q));
  }
  return r;
}

/* ─────────────────────────────────────────────
   RENDER
───────────────────────────────────────────── */
function render() {
  const app = document.getElementById('app');
  let html = '';
  switch(S.screen) {
    case 'setup':   html = rSetup(); break;
    case 'init':
    case 'loading': html = rLoading(); break;
    case 'home':    html = rHome(); break;
    case 'new-invoice': html = rNewInv(); break;
    case 'view-invoice': html = rViewInv(); break;
    case 'settings': html = rSettings(); break;
    default: html = rHome();
  }
  if (S.dialog)    html += rDialog();
  if (S.custModal) html += rCustModal();
  if (S.toast)     html += rToast();
  if (S.saving)    html += rSaving();
  app.innerHTML = html;
  afterRender();
}

function afterRender() {
  if (S.custModal) {
    setTimeout(() => { const el=document.getElementById('csrch'); if(el) el.focus(); }, 250);
  }
}

function doSetup() {
  const cid = document.getElementById('scid').value.trim();
  const sid = document.getElementById('ssid').value.trim();
  const tab = document.getElementById('stab').value.trim() || 'חשבוניות';
  if (!cid) { toast('נא להזין Client ID', 'err'); return; }
  if (!sid) { toast('נא להזין Sheet ID', 'err'); return; }
  CFG.CLIENT_ID = cid; CFG.SHEET_ID = sid; CFG.TAB_NAME = tab;
  localStorage.setItem('cid', cid); localStorage.setItem('sid', sid); localStorage.setItem('tab', tab);
  tokenClient = null;
  go('loading');
  if (typeof google !== 'undefined') { initTokenClient(); auth(); }
  else { toast('טוען ספריות Google...'); const t=setInterval(()=>{ if(typeof google!=='undefined'){clearInterval(t);initTokenClient();auth();}},500); setTimeout(()=>clearInterval(t),10000); }
}

function doRefresh() {
  sessionStorage.removeItem('ivcache');
  if (!S.token || Date.now() > S.tokenExp) auth();
  else loadData(true);
}

function startNew(type) {
  initForm(type);
  history.pushState({}, '', '');
  go('new-invoice');
}

  const inv = S.invoices.find(i => i.num === num);
  if (!inv) return;
  history.pushState({}, '', '');
  assign({ screen: 'view-invoice', currentInv: inv });
}

function backFromForm() {
  dialog('לצאת ללא שמירה?','השינויים לא יישמרו','צא','המשך עריכה',
    ()=>assign({screen:'home',dialog:null}), ()=>assign({dialog:null}));
}

function doSave() {
  if (!FORM.biz) { toast('נא להזין שם עסק', 'err'); return; }
  if (!FORM.items.some(i=>i.desc)) { toast('נא להוסיף לפחות פריט אחד', 'err'); return; }
  const {sub,vat,total} = calcTotals();
  const inv = {
    num:FORM.num, type:FORM.type, date:FORM.date,
    biz:FORM.biz, bizId:FORM.bizId, addr:FORM.addr, phone:FORM.phone,
    items:FORM.items.filter(i=>i.desc),
    sub, vat, total, notes:FORM.notes
  };
  if (!S.token || Date.now() > S.tokenExp) {
    toast('מחדש אימות...', 'info');
    auth(); return;
  }
  saveInvoice(inv);
}

function addItem() { if(FORM.items.length<3){FORM.items.push({desc:'',qty:1,price:''});render();} }
function rmItem(i) { if(FORM.items.length===1){FORM.items[0]={desc:'',qty:1,price:''};}else{FORM.items.splice(i,1);}render(); }

function updTotals() {
  const {sub,vat,total}=calcTotals();
  const ts=document.getElementById('ts'), tv=document.getElementById('tv'), tt=document.getElementById('tt');
  if(ts)ts.textContent=fmt(sub); if(tv)tv.textContent=fmt(vat); if(tt)tt.textContent=fmt(total);
}

function openCustModal() { assign({custModal:true,custSearch:''}); }
function closeCustModal() { assign({custModal:false,custSearch:''}); }

function pickCust(i) {
  const c = filteredCusts[i];
  if (!c) return;
  FORM.biz=c.name; FORM.bizId=c.id; FORM.addr=c.addr; FORM.phone=c.phone;
  assign({custModal:false,custSearch:''});
}

function doChangeSheet() {
  dialog('שנה גיליון?','כל ההגדרות יאופסו','אפס','ביטול',
    ()=>{ CFG.CLIENT_ID='';CFG.SHEET_ID='';localStorage.clear();sessionStorage.clear();S.token=null;S.tokenExp=0;assign({dialog:null,screen:'setup',invoices:[],customers:[]}); },
    ()=>assign({dialog:null})
  );
}

/* ─────────────────────────────────────────────
   INIT
───────────────────────────────────────────── */
render();
</script>
</body>
</html>
