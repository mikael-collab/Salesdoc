<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a3a6b">
<title>חשבוניות</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap');

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --blue:#1a3a6b;
  --blue2:#2451a3;
  --blue-l:#edf3ff;
  --teal:#0e7490;
  --teal-l:#ecfeff;
  --green:#15803d;
  --green-l:#dcfce7;
  --red:#b91c1c;
  --red-l:#fee2e2;
  --amber:#92400e;
  --amber-l:#fef3c7;
  --bg:#f4f6fb;
  --white:#ffffff;
  --text:#0f172a;
  --text2:#475569;
  --text3:#94a3b8;
  --border:#e2e8f0;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 16px rgba(0,0,0,.10),0 1px 4px rgba(0,0,0,.06);
  --shadow-lg:0 10px 40px rgba(0,0,0,.15),0 2px 8px rgba(0,0,0,.08);
  --r:14px;
  --st:env(safe-area-inset-top,0px);
  --sb:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'Heebo',sans-serif;color:var(--text);direction:rtl;overscroll-behavior:none;-webkit-font-smoothing:antialiased}
#app{height:100%;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* ── SCROLLABLE AREAS ── */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* ── HEADER ── */
.hdr{
  background:linear-gradient(135deg,var(--blue) 0%,var(--blue2) 100%);
  color:#fff;
  padding:calc(var(--st) + 12px) 16px 12px;
  display:flex;align-items:center;gap:10px;
  box-shadow:0 2px 20px rgba(26,58,107,.35);
  flex-shrink:0;position:relative;z-index:10;
}
.hdr-back{background:rgba(255,255,255,.15);border:none;color:#fff;cursor:pointer;
  width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-back:active{background:rgba(255,255,255,.3)}
.hdr-title{font-size:17px;font-weight:800;flex:1;letter-spacing:-.2px}
.hdr-sub{font-size:11px;opacity:.7;margin-top:1px;font-weight:500}
.hdr-btn{background:rgba(255,255,255,.15);border:none;color:#fff;cursor:pointer;
  width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.hdr-btn:active{background:rgba(255,255,255,.3)}
.hdr-g{background:linear-gradient(135deg,var(--green) 0%,#166534 100%)}

/* ── CARDS ── */
.card{background:var(--white);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;margin:8px 14px}
.card-flat{margin:0;border-radius:0;box-shadow:none;border-bottom:1px solid var(--border)}
.card-flat:last-child{border-bottom:none}

/* ── INVOICE LIST CARDS ── */
.inv-card{cursor:pointer;transition:transform .12s,box-shadow .12s}
.inv-card:active{transform:scale(.977);box-shadow:var(--shadow)}
.inv-r{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:9px 14px}
.inv-r1{border-bottom:1px solid var(--border)}
.inv-r2{border-bottom:1px solid var(--border)}
.inv-r3{background:var(--blue-l)}

/* row 1 */
.inv-num{font-size:14px;font-weight:800;color:var(--blue)}
.inv-badge{font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;letter-spacing:.2px}
.badge-inv{background:var(--blue-l);color:var(--blue)}
.badge-rec{background:var(--green-l);color:var(--green)}

/* row 2 */
.inv-biz{font-size:13px;font-weight:700;color:var(--text)}
.inv-id{font-size:12px;color:var(--text3)}

/* row 3 — date & total in blue */
.inv-date{font-size:12px;font-weight:700;color:var(--blue)}
.inv-total{font-size:13px;font-weight:800;color:var(--blue)}

/* ── SEARCH ── */
.srch-wrap{padding:10px 14px 4px;flex-shrink:0}
.srch-box{display:flex;align-items:center;background:var(--white);border:2px solid var(--border);border-radius:12px;padding:0 12px;gap:8px;transition:border-color .2s}
.srch-box:focus-within{border-color:var(--blue2)}
.srch-box input{flex:1;border:none;outline:none;font-size:14px;padding:10px 0;background:none;color:var(--text);font-family:'Heebo',sans-serif;direction:rtl}
.srch-ico{color:var(--text3);flex-shrink:0}

/* ── FILTER TABS ── */
.ftabs{display:flex;gap:6px;padding:6px 14px 8px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.ftabs::-webkit-scrollbar{display:none}
.ftab{border:1.5px solid var(--border);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;color:var(--text3);background:var(--white);font-family:'Heebo',sans-serif;transition:all .15s}
.ftab.on{background:var(--blue);border-color:var(--blue);color:#fff}

/* ── FAB ── */
.fab-wrap{position:fixed;bottom:calc(var(--sb)+16px);left:0;right:0;display:flex;justify-content:center;gap:10px;z-index:100;padding:0 14px}
.fab{border:none;border-radius:28px;padding:14px 20px;font-size:13px;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:7px;font-family:'Heebo',sans-serif;flex:1;justify-content:center;max-width:175px;letter-spacing:.1px}
.fab-blue{background:linear-gradient(135deg,var(--blue) 0%,var(--blue2) 100%);color:#fff;box-shadow:0 4px 20px rgba(26,58,107,.4)}
.fab-teal{background:linear-gradient(135deg,var(--green) 0%,#166534 100%);color:#fff;box-shadow:0 4px 20px rgba(14,116,144,.35)}
.fab:active{transform:scale(.94)}

/* ── FORM FIELDS ── */
.fsec{padding:0 14px;margin-top:10px}
.fsec-label{font-size:10px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.finp{width:100%;padding:11px 13px;border:2px solid var(--border);border-radius:10px;font-size:15px;background:var(--white);color:var(--text);direction:rtl;outline:none;font-family:'Heebo',sans-serif;transition:border-color .2s;-webkit-appearance:none}
.finp:focus{border-color:var(--blue2)}
.finp[type=number]{direction:ltr;text-align:left}
.finp[type=date]{direction:ltr;text-align:right}
textarea.finp{resize:none}
.flbl{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:4px}
.fgrp{margin-bottom:10px}

/* ── ITEMS TABLE ── */
.items-grid{display:grid;grid-template-columns:1fr 58px 72px 30px;gap:5px;align-items:start}
.items-hdr span{font-size:11px;font-weight:700;color:var(--text3)}
.item-row .finp{padding:9px 8px;font-size:13px}
.btn-rm{background:none;border:1.5px solid #fca5a5;color:#dc2626;border-radius:8px;width:30px;height:40px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
.btn-add-item{background:var(--blue-l);border:2px dashed var(--blue2);color:var(--blue2);border-radius:10px;padding:10px;font-size:13px;font-weight:700;width:100%;cursor:pointer;text-align:center;margin-top:4px;font-family:'Heebo',sans-serif}

/* ── TOTALS ── */
.totals-wrap{margin:10px 14px;background:var(--white);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
.total-row{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-bottom:1px solid var(--border);font-size:14px}
.total-row:last-child{border:none}
.total-lbl{color:var(--text2);font-weight:500}
.total-val{font-weight:700}
.total-grand{background:linear-gradient(135deg,var(--blue) 0%,var(--blue2) 100%);color:#fff}
.total-grand .total-lbl,.total-grand .total-val{color:#fff}
.total-grand .total-val{font-size:17px;font-weight:900}

/* ── SAVE BAR ── */
.save-bar{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);padding:10px 14px calc(var(--sb)+10px);box-shadow:0 -4px 20px rgba(0,0,0,.08);z-index:50;flex-shrink:0}

/* ── BUTTONS ── */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;border:none;border-radius:12px;padding:14px 20px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Heebo',sans-serif;transition:opacity .15s,transform .1s}
.btn:active{transform:scale(.97);opacity:.9}
.btn-primary{background:linear-gradient(135deg,var(--blue) 0%,var(--blue2) 100%);color:#fff;box-shadow:0 4px 20px rgba(26,58,107,.3)}
.btn-primary:disabled{opacity:.55;cursor:not-allowed}
.btn-outline{background:var(--white);color:var(--blue);border:2px solid var(--blue)}
.btn-ghost{background:none;color:var(--text3);border:1.5px solid var(--border)}
.btn-danger{background:var(--white);color:var(--red);border:2px solid var(--red)}

/* ── DETAIL VIEW ── */
.det-hero{padding:18px 14px;background:var(--blue-l);text-align:center}
.det-biz{font-size:18px;font-weight:900;color:var(--blue)}
.det-id{font-size:12px;color:var(--text3);margin-top:3px}
.det-row{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-bottom:1px solid var(--border);font-size:13px}
.det-row:last-child{border:none}
.det-lbl{color:var(--text3);font-weight:500}
.det-val{font-weight:700;text-align:left}
.items-tbl{width:100%;border-collapse:collapse;font-size:12px}
.items-tbl th{background:var(--bg);padding:8px 12px;text-align:right;font-weight:700;color:var(--text3);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.items-tbl td{padding:10px 12px;border-bottom:1px solid var(--border)}
.items-tbl td:last-child,.items-tbl th:last-child{text-align:left;font-weight:800}

/* ── CUSTOMER MODAL ── */
.sheet-bg{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:500;display:flex;flex-direction:column;animation:fadein .18s}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.sheet{background:var(--white);border-radius:20px 20px 0 0;margin-top:auto;max-height:80vh;display:flex;flex-direction:column;animation:slideup .22s cubic-bezier(.22,.61,.36,1)}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-hdr{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.sheet-title{font-size:16px;font-weight:800}
.sheet-x{background:var(--bg);border:none;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px;color:var(--text2);display:flex;align-items:center;justify-content:center}
.cust-item{padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.cust-item:active{background:var(--blue-l)}
.cust-name{font-weight:700;font-size:14px}
.cust-meta{font-size:12px;color:var(--text3);margin-top:2px}

/* ── DIALOG ── */
.dlg-bg{position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:800;display:flex;align-items:flex-end;animation:fadein .15s}
.dlg{background:var(--white);border-radius:20px 20px 0 0;padding:22px 16px calc(var(--sb)+22px);width:100%;animation:slideup .2s cubic-bezier(.22,.61,.36,1)}
.dlg-title{font-size:18px;font-weight:800;text-align:center;margin-bottom:6px}
.dlg-body{font-size:14px;color:var(--text2);text-align:center;margin-bottom:22px;line-height:1.5}
.dlg-btns{display:flex;gap:10px}

/* ── TOAST ── */
.toast{position:fixed;bottom:calc(var(--sb)+100px);left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:24px;font-size:13px;font-weight:600;z-index:2000;white-space:nowrap;max-width:90%;text-align:center;box-shadow:var(--shadow-md);animation:toastin .28s cubic-bezier(.22,.61,.36,1)}
@keyframes toastin{from{opacity:0;transform:translateX(-50%) translateY(14px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.toast-info{background:var(--text);color:#fff}
.toast-ok{background:var(--green);color:#fff}
.toast-err{background:var(--red);color:#fff}

/* ── SPINNER / SKELETON ── */
.spinner{width:38px;height:38px;border:3px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.skel{background:linear-gradient(90deg,#e8edf5 25%,#dde3ef 50%,#e8edf5 75%);background-size:200% 100%;animation:skel 1.3s infinite;border-radius:6px}
@keyframes skel{to{background-position:-200% 0}}

/* ── SAVING OVERLAY ── */
.saving-ov{position:fixed;inset:0;background:rgba(15,23,42,.4);z-index:3000;display:flex;align-items:center;justify-content:center}
.saving-box{background:var(--white);border-radius:18px;padding:28px 36px;text-align:center;box-shadow:var(--shadow-lg)}
.saving-spin{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue2);border-radius:50%;animation:spin .75s linear infinite;margin:0 auto 12px}

/* ── SETUP / ONBOARDING ── */
.setup-wrap{min-height:100%;overflow-y:auto;background:linear-gradient(160deg,var(--blue) 0%,#0f2655 50%,#0a1e45 100%);padding:20px 16px 40px;display:flex;flex-direction:column;align-items:center}
.setup-logo{font-size:52px;margin:16px 0 10px;filter:drop-shadow(0 4px 12px rgba(0,0,0,.3))}
.setup-title{color:#fff;font-size:26px;font-weight:900;letter-spacing:-.5px;text-align:center}
.setup-sub{color:rgba(255,255,255,.6);font-size:13px;margin-top:4px;margin-bottom:20px;text-align:center}
.setup-card{background:rgba(255,255,255,.97);border-radius:18px;padding:18px;width:100%;max-width:420px;margin-bottom:10px;box-shadow:var(--shadow-lg)}
.step-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:14px}
.step-row:last-child{margin-bottom:0}
.step-num{width:24px;height:24px;background:var(--blue);color:#fff;border-radius:50%;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step-content{flex:1}
.step-title{font-size:13px;font-weight:800;color:var(--text);margin-bottom:3px}
.step-hint{font-size:11px;color:var(--text3);line-height:1.55}
.code-pre{background:#0f172a;border-radius:10px;padding:12px;font-size:10.5px;font-family:'Courier New',monospace;color:#e2e8f0;direction:ltr;text-align:left;white-space:pre;overflow-x:auto;margin:8px 0;line-height:1.6;max-height:180px;overflow-y:auto}
.copy-btn{background:var(--blue-l);border:1.5px solid var(--blue2);color:var(--blue);border-radius:8px;padding:8px 12px;font-size:12px;font-weight:700;cursor:pointer;width:100%;font-family:'Heebo',sans-serif;margin-top:2px}

/* ── SETTINGS ── */
.srow{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border)}
.srow:last-child{border:none}
.srow-lbl{font-weight:700;font-size:14px}
.srow-val{color:var(--text3);font-size:12px;max-width:190px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;direction:ltr;text-align:left}

/* ── EMPTY STATE ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--text3);text-align:center}
.empty-ico{font-size:48px;margin-bottom:14px;opacity:.6}
.empty-title{font-size:16px;font-weight:700;color:var(--text2);margin-bottom:6px}
.empty-sub{font-size:13px}

/* ── IFRAME WARNING ── */
.iframe-warn{background:var(--amber-l);border:2px solid #fbbf24;border-radius:12px;padding:12px 14px;margin:10px 14px;font-size:12px;line-height:1.6;color:var(--amber)}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* ══════════════════════════════════════════════════════
   CONFIG
══════════════════════════════════════════════════════ */
const CFG = {
  URL: localStorage.getItem('gs_url') || '',
  TAB: localStorage.getItem('gs_tab') || 'חשבוניות',
  C: { NUM:0,TYPE:1,DATE:2,BIZ:3,ID:4,ADDR:5,PHONE:6,
       I1D:7,I1Q:8,I1P:9, I2D:10,I2Q:11,I2P:12, I3D:13,I3Q:14,I3P:15,
       SUB:16,VAT:17,TOTAL:18,NOTES:19 }
};

/* ══════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════ */
const S = {
  screen: 'setup',
  invoices: [], customers: [], currentInv: null,
  search: '', filter: 'all',
  saving: false, loading: false,
  dialog: null, custModal: false, custSearch: '',
  toast: null,
};
let FORM = {}, dlgOk = null, dlgCancel = null, filteredCusts = [];
const navStack = [];

/* ══════════════════════════════════════════════════════
   NAVIGATION — no history.pushState (blocked in iframes)
══════════════════════════════════════════════════════ */
function go(screen) {
  navStack.push(S.screen);
  S.screen = screen;
  render();
}
function goBack() {
  S.screen = navStack.pop() || 'home';
  render();
}

/* Physical Android back — wrapped in try/catch for iframe safety */
try {
  history.pushState({}, '', ' ');
  window.addEventListener('popstate', () => {
    try { history.pushState({}, '', ' '); } catch(e) {}
    handleBack();
  });
} catch(e) {}

function handleBack() {
  if (S.dialog)   { assign({ dialog: null }); return; }
  if (S.custModal){ assign({ custModal: false }); return; }
  switch(S.screen) {
    case 'home':
    case 'setup':
      dlg('לצאת מהאפליקציה?', 'האם אתה בטוח שברצונך לצאת?', 'יציאה', 'ביטול',
        () => { try { window.close(); } catch(e) {} },
        () => assign({ dialog: null }));
      break;
    case 'new-invoice':
      dlg('לצאת ללא שמירה?', 'השינויים לא יישמרו', 'צא', 'המשך עריכה',
        () => { navStack.length = 0; assign({ screen: 'home', dialog: null }); },
        () => assign({ dialog: null }));
      break;
    default:
      goBack();
  }
}

/* ══════════════════════════════════════════════════════
   APPS SCRIPT API  — GET only (no CORS preflight)
══════════════════════════════════════════════════════ */
async function apiCall(params) {
  const u = new URL(CFG.URL);
  u.searchParams.set('tab', CFG.TAB);
  Object.entries(params).forEach(([k,v]) => u.searchParams.set(k, v));
  let raw;
  try {
    const r = await fetch(u.toString());
    raw = await r.text();
  } catch(e) {
    const inIframe = window.self !== window.top;
    if (inIframe) throw new Error('האפליקציה פועלת בתוך Claude ולא יכולה לגשת לאינטרנט.\nהורד את קובץ ה-HTML ופתח אותו ישירות בדפדפן.');
    throw new Error('לא ניתן להגיע לשרת: ' + e.message);
  }
  if (raw.trim().startsWith('<')) {
    if (raw.includes('accounts.google') || raw.includes('ServiceLogin'))
      throw new Error('הסקריפט דורש התחברות.\n\nתיקון: פרוס ▸ נהל פריסות ▸ ✏️ ▸ "מי יכול לגשת" → כולם ▸ גרסה חדשה ▸ פרוס');
    throw new Error('השרת החזיר HTML. ודא שה-URL מסתיים ב /exec');
  }
  let j;
  try { j = JSON.parse(raw); } catch(e) { throw new Error('תגובה לא תקינה:\n' + raw.slice(0,150)); }
  if (!j.ok) throw new Error(j.error || 'שגיאה מהשרת');
  return j;
}

async function loadSheet() {
  const j = await apiCall({ action: 'read' });
  return j.data || [];
}
async function appendRow(row) {
  return apiCall({ action: 'write', row: encodeURIComponent(JSON.stringify(row)) });
}

/* ══════════════════════════════════════════════════════
   DATA
══════════════════════════════════════════════════════ */
async function loadData() {
  go('loading');
  const cached = sessionStorage.getItem('inv_cache');
  if (cached) {
    try {
      const { ts, inv, cust } = JSON.parse(cached);
      if (Date.now() - ts < 300000) { assign({ invoices: inv, customers: cust }); go('home'); return; }
    } catch(e) {}
  }
  try {
    const rows = await loadSheet();
    const data = rows.slice(1).filter(r => r[CFG.C.NUM]);
    const inv = data.map(parseRow).reverse();
    const custMap = new Map();
    data.forEach(r => {
      const k = (r[CFG.C.BIZ]||'') + '|' + (r[CFG.C.ID]||'');
      if (r[CFG.C.BIZ] && !custMap.has(k))
        custMap.set(k, { name: String(r[CFG.C.BIZ]), id: String(r[CFG.C.ID]||''), addr: String(r[CFG.C.ADDR]||''), phone: String(r[CFG.C.PHONE]||'') });
    });
    const cust = [...custMap.values()];
    sessionStorage.setItem('inv_cache', JSON.stringify({ ts: Date.now(), inv, cust }));
    assign({ invoices: inv, customers: cust });
    go('home');
  } catch(e) {
    toast(e.message || 'שגיאה בטעינה', 'err');
    go('setup');
  }
}

function parseRow(r) {
  const items = [];
  [[CFG.C.I1D,CFG.C.I1Q,CFG.C.I1P],[CFG.C.I2D,CFG.C.I2Q,CFG.C.I2P],[CFG.C.I3D,CFG.C.I3Q,CFG.C.I3P]]
    .forEach(([d,q,p]) => { if (r[d]) items.push({ desc:String(r[d]), qty:+r[q]||1, price:+r[p]||0 }); });
  return {
    num: String(r[CFG.C.NUM]||''), type: String(r[CFG.C.TYPE]||'חשבונית'),
    date: String(r[CFG.C.DATE]||''), biz: String(r[CFG.C.BIZ]||''),
    bizId: String(r[CFG.C.ID]||''), addr: String(r[CFG.C.ADDR]||''),
    phone: String(r[CFG.C.PHONE]||''), items,
    sub: +r[CFG.C.SUB]||0, vat: +r[CFG.C.VAT]||0, total: +r[CFG.C.TOTAL]||0,
    notes: String(r[CFG.C.NOTES]||''),
  };
}

function rowFromInv(inv) {
  const a = new Array(20).fill('');
  a[CFG.C.NUM]=inv.num; a[CFG.C.TYPE]=inv.type; a[CFG.C.DATE]=inv.date;
  a[CFG.C.BIZ]=inv.biz; a[CFG.C.ID]=inv.bizId; a[CFG.C.ADDR]=inv.addr; a[CFG.C.PHONE]=inv.phone;
  [[CFG.C.I1D,CFG.C.I1Q,CFG.C.I1P],[CFG.C.I2D,CFG.C.I2Q,CFG.C.I2P],[CFG.C.I3D,CFG.C.I3Q,CFG.C.I3P]]
    .forEach(([d,q,p],i) => { if (inv.items[i]) { a[d]=inv.items[i].desc; a[q]=inv.items[i].qty; a[p]=inv.items[i].price; } });
  a[CFG.C.SUB]=inv.sub; a[CFG.C.VAT]=inv.vat; a[CFG.C.TOTAL]=inv.total; a[CFG.C.NOTES]=inv.notes;
  return a;
}

async function saveInvoice(inv) {
  assign({ saving: true });
  try {
    await appendRow(rowFromInv(inv));
    sessionStorage.removeItem('inv_cache');
    const hasCust = S.customers.find(c => c.name === inv.biz);
    assign({
      invoices: [inv, ...S.invoices],
      customers: hasCust ? S.customers : [{ name:inv.biz, id:inv.bizId, addr:inv.addr, phone:inv.phone }, ...S.customers],
      saving: false,
    });
    toast('החשבונית נשמרה ✓', 'ok');
    navStack.length = 0;
    go('home');
  } catch(e) {
    toast(e.message || 'שגיאה בשמירה', 'err');
    assign({ saving: false });
  }
}

/* ══════════════════════════════════════════════════════
   FORM
══════════════════════════════════════════════════════ */
function initForm(type) {
  const nums = S.invoices.map(i => parseInt(i.num)).filter(n => !isNaN(n));
  FORM = {
    type, num: nums.length ? String(Math.max(...nums)+1) : '1001',
    date: new Date().toISOString().slice(0,10),
    biz:'', bizId:'', addr:'', phone:'',
    items: [{ desc:'', qty:1, price:'' }],
    notes: '',
  };
}
function calcTotals() {
  const sub = FORM.items.reduce((s,it) => s + (+it.qty||0) * (+it.price||0), 0);
  const vat = Math.round(sub * 17) / 100;
  return { sub: Math.round(sub*100)/100, vat, total: Math.round((sub+vat)*100)/100 };
}

/* ══════════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════════ */
function fmt(n)    { return '₪' + Number(n||0).toLocaleString('he-IL',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtD(d)   { if (!d) return ''; if (d.includes('-')) { const [y,m,dd]=d.split('-'); return `${dd}/${m}/${y}`; } return d; }
function x(s)      { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function assign(o) { Object.assign(S,o); render(); }
function toast(msg, type='info') { S.toast={msg,type}; render(); setTimeout(()=>{S.toast=null;render();},3000); }
function dlg(title,body,ok,cancel,onOk,onCancel) { dlgOk=onOk; dlgCancel=onCancel; assign({ dialog:{title,body,ok,cancel} }); }
function getFiltered() {
  let r = S.invoices;
  if (S.filter !== 'all') r = r.filter(i => i.type === S.filter);
  if (S.search) { const q=S.search.toLowerCase(); r=r.filter(i=>i.biz.toLowerCase().includes(q)||i.bizId.includes(q)||i.num.includes(q)); }
  return r;
}

/* ══════════════════════════════════════════════════════
   APPS SCRIPT CODE (shown on setup screen)
══════════════════════════════════════════════════════ */
const GAS_CODE = `var SHEET_ID = 'YOUR_SHEET_ID_HERE';

function doGet(e) {
  try {
    var p   = e && e.parameter ? e.parameter : {};
    var tab = p.tab || 'חשבוניות';
    var ss  = SpreadsheetApp.openById(SHEET_ID);
    var sh  = ss.getSheetByName(tab);
    if (!sh) return out({ok:false, error:'לשונית לא נמצאה: '+tab});
    if (p.action === 'write') {
      var row = JSON.parse(decodeURIComponent(p.row));
      sh.appendRow(row);
      return out({ok:true});
    }
    return out({ok:true, data: sh.getDataRange().getValues()});
  } catch(err) { return out({ok:false, error:err.message}); }
}

function out(d) {
  return ContentService
    .createTextOutput(JSON.stringify(d))
    .setMimeType(ContentService.MimeType.JSON);
}`;

    <div class="scroll">
      <div class="card" style="margin-top:14px;padding:0">
        <div class="srow"><span class="srow-lbl">לשונית גיליון</span><span class="srow-val">${x(CFG.TAB)}</span></div>
        <div class="srow"><span class="srow-lbl">סה"כ חשבוניות</span><span class="srow-val">${S.invoices.length}</span></div>
        <div class="srow"><span class="srow-lbl">לקוחות במאגר</span><span class="srow-val">${S.customers.length}</span></div>
        <div class="srow"><span class="srow-lbl">כתובת סקריפט</span><span class="srow-val">${x(CFG.URL.slice(0,45))}${CFG.URL.length>45?'…':''}</span></div>
      </div>
      <div class="card" style="padding:14px;display:flex;flex-direction:column;gap:10px">
        <button class="btn btn-outline" onclick="doRefresh()">🔃 רענן נתונים מהגיליון</button>
        <button class="btn btn-danger" onclick="askReset()">🔄 שנה גיליון / הגדרות</button>
      </div>
      <div style="text-align:center;padding:24px;color:var(--text3);font-size:11px">מנהל חשבוניות v3.0</div>
    </div>
  </div>`;
}

/* ─── CUSTOMER MODAL ─── */
function rCustModal() {
  const q = S.custSearch.toLowerCase();
  const res = q ? S.customers.filter(c => c.name.toLowerCase().includes(q) || c.id.includes(q)) : S.customers;
  filteredCusts = res;
  return `<div class="sheet-bg" onclick="if(event.target===this)assign({custModal:false,custSearch:''})">
    <div class="sheet">
      <div class="sheet-hdr">
        <span class="sheet-title">בחר לקוח</span>
        <button class="sheet-x" onclick="assign({custModal:false,custSearch:''})">✕</button>
      </div>
      <div style="padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0">
        <div class="srch-box">
          <span class="srch-ico">${svgSearch()}</span>
          <input id="cust_srch" placeholder="חפש לפי שם העסק או ח.פ..." value="${x(S.custSearch)}" oninput="S.custSearch=this.value;render()">
        </div>
      </div>
      <div class="scroll">
        ${res.length === 0
          ? `<div style="padding:28px;text-align:center;color:var(--text3);font-size:14px">${S.custSearch?'לא נמצאו תוצאות':'צור את החשבונית הראשונה — הלקוחות יישמרו אוטומטית'}</div>`
          : res.map((c,i) => `<div class="cust-item" onclick="pickCust(${i})">
              <div class="cust-name">${x(c.name)}</div>
              <div class="cust-meta">ח.פ: ${x(c.id)}${c.phone ? ' · ' + x(c.phone) : ''}</div>
            </div>`).join('')}
      </div>
    </div>
  </div>`;
}

/* ─── DIALOG ─── */
function rDialog() {
  const d = S.dialog;
  return `<div class="dlg-bg">
    <div class="dlg">
      <div class="dlg-title">${x(d.title)}</div>
      <div class="dlg-body">${x(d.body)}</div>
      <div class="dlg-btns">
        <button class="btn btn-ghost" style="flex:1" onclick="dlgCancel&&dlgCancel()">${x(d.cancel)}</button>
        <button class="btn btn-primary" style="flex:1" onclick="dlgOk&&dlgOk()">${x(d.ok)}</button>
      </div>
    </div>
  </div>`;
}

/* ══════════════════════════════════════════════════════
   SVG ICONS
══════════════════════════════════════════════════════ */
function svgChevron() { return `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>`; }
function svgRefresh()  { return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.64"/></svg>`; }
function svgSettings() { return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06-.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>`; }
function svgSearch()   { return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`; }
function svgPlus()     { return `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`; }

/* ══════════════════════════════════════════════════════
   HANDLERS
══════════════════════════════════════════════════════ */
function copyCode() {
  navigator.clipboard.writeText(GAS_CODE)
    .then(() => toast('הקוד הועתק ✓', 'ok'))
    .catch(() => toast('בחר את הקוד ידנית', 'err'));
}

function clearCfg() {
  localStorage.clear(); sessionStorage.clear();
  CFG.URL = ''; CFG.TAB = 'חשבוניות';
  assign({ invoices:[], customers:[], screen:'setup' });
}

function doSetup() {
  const url = (document.getElementById('s_url')?.value || '').trim();
  const tab = (document.getElementById('s_tab')?.value || '').trim() || 'חשבוניות';
  if (!url) { toast('נא להזין את כתובת הסקריפט', 'err'); return; }
  if (!url.startsWith('https://script.google.com')) { toast('הכתובת לא נראית תקינה', 'err'); return; }
  CFG.URL = url; CFG.TAB = tab;
  localStorage.setItem('gs_url', url);
  localStorage.setItem('gs_tab', tab);
  loadData();
}

function doRefresh() {
  sessionStorage.removeItem('inv_cache');
  loadData();
}

function askReset() {
  dlg('איפוס הגדרות?','כל הגדרות החיבור יימחקו','אפס','ביטול',
    () => { clearCfg(); assign({ dialog:null }); },
    () => assign({ dialog:null }));
}

function startNew(type) {
  initForm(type);
  go('new-invoice');
}

function openInv(num) {
  const inv = S.invoices.find(i => i.num === num);
  if (!inv) return;
  S.currentInv = inv;
  go('view');
}

function doSave() {
  if (!FORM.biz) { toast('נא להזין שם עסק', 'err'); return; }
  if (!FORM.items.some(i => i.desc)) { toast('נא להוסיף לפחות פריט אחד', 'err'); return; }
  const { sub, vat, total } = calcTotals();
  saveInvoice({
    num:FORM.num, type:FORM.type, date:FORM.date,
    biz:FORM.biz, bizId:FORM.bizId, addr:FORM.addr, phone:FORM.phone,
    items:FORM.items.filter(i=>i.desc), sub, vat, total, notes:FORM.notes,
  });
}

function addItem()  { if (FORM.items.length < 3) { FORM.items.push({ desc:'', qty:1, price:'' }); render(); } }
function rmItem(i)  { if (FORM.items.length===1) FORM.items[0]={desc:'',qty:1,price:''}; else FORM.items.splice(i,1); render(); }
function liveTotal(){ const{sub,vat,total}=calcTotals(); ['t_sub','t_vat','t_tot'].forEach((id,i)=>{const el=document.getElementById(id);if(el)el.textContent=fmt([sub,vat,total][i]);}); }
function openCust() { assign({ custModal:true, custSearch:'' }); }
function pickCust(i){ const c=filteredCusts[i]; if(!c) return; FORM.biz=c.name; FORM.bizId=c.id; FORM.addr=c.addr; FORM.phone=c.phone; assign({ custModal:false, custSearch:'' }); }

/* ══════════════════════════════════════════════════════
   START
══════════════════════════════════════════════════════ */
render();
</script>
</body>
</html>
